services:
  app:
    volumes:
      - ./.env.docker:/app/config/.env.docker
      - ./:/app/source
      - /var/run/docker.sock:/var/run/docker.sock

  updater:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      AUTO_OPEN_BROWSER: "false"
      GANKAIGC_ENV_FILE: /app/config/.env.docker
      DATABASE_URL: postgresql://ai_polish:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}@postgres:5432/ai_polish
      VPS_UPDATE_ENABLED: "true"
      VPS_UPDATE_WORKDIR: /app/source
      VPS_UPDATE_LOG_FILE: /app/source/logs/vps-update.log
    working_dir: /app/source
    command: >
      sh -lc "git pull --ff-only origin main &&
      docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.update.yml up --build -d app worker"
    volumes:
      - ./.env.docker:/app/config/.env.docker
      - ./:/app/source
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - update
    restart: "no"
